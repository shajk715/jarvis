<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <title>LUMI - 음성 AI 어시스턴트</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LUMI">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="auth-screen">
    <div class="auth-container">
      <h1 class="auth-title">L.U.M.I</h1>
      <p class="auth-subtitle">음성 AI 어시스턴트</p>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="이메일" required>
        <input type="password" id="auth-password" placeholder="비밀번호" required>
        <button type="submit" id="auth-submit">로그인</button>
      </form>
      <p class="auth-toggle">계정이 없으신가요? <a href="#" id="toggle-auth">회원가입</a></p>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- 배경 그리드 -->
    <div id="bg-grid"></div>

    <!-- 상태 표시 영역 -->
    <header id="status-bar">
      <span id="status-text">대기 중</span>
      <span id="time-display"></span>
    </header>

    <!-- 메인 비주얼 (음성 파형/아이콘 영역) -->
    <main id="main-area">
      <!-- 인앱 유튜브 플레이어 (재생 중에만 표시) -->
      <div id="player-container" hidden>
        <div id="player-header">
          <span>재생 중</span>
          <button id="player-close" type="button" aria-label="닫기">✕</button>
        </div>
        <div id="youtube-player"></div>
      </div>
      <div id="orb-container">
        <div id="orb" class="idle">
          <div class="orb-core"></div>
        </div>
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
        <div class="ripple ripple-3"></div>
        <div class="ripple ripple-4"></div>
      </div>
      <p id="guide-message">루미라고 불러주세요</p>
      <p id="transcript"></p>
      <p id="response-text"></p>
      <button id="external-open-btn" type="button" hidden>탭하여 열기</button>
    </main>

    <!-- 하단 컨트롤 -->
    <footer id="controls">
      <button id="mic-btn" aria-label="마이크 토글">🎤</button>
    </footer>
  </div>

  <script type="module" src="app.js"></script>

  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] 등록 완료:', reg.scope))
          .catch(err => console.warn('[SW] 등록 실패:', err));
      });
    }
  </script>
</body>
</html>
