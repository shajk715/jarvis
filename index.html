<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <title>JARVIS - 음성 AI 어시스턴트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 배경 그리드 -->
    <div id="bg-grid"></div>

    <!-- 상태 표시 영역 -->
    <header id="status-bar">
      <span id="status-text">대기 중</span>
      <span id="time-display"></span>
    </header>

    <!-- 메인 비주얼 (음성 파형/아이콘 영역) -->
    <main id="main-area">
      <div id="orb-container">
        <div id="orb" class="idle">
          <div class="orb-core"></div>
        </div>
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
        <div class="ripple ripple-3"></div>
        <div class="ripple ripple-4"></div>
      </div>
      <p id="guide-message">자비스라고 불러주세요</p>
      <p id="transcript"></p>
      <p id="response-text"></p>
    </main>

    <!-- 하단 컨트롤 -->
    <footer id="controls">
      <button id="mic-btn" aria-label="마이크 토글">🎤</button>
    </footer>

    <!-- YouTube 플레이어 (숨김) -->
    <div id="youtube-player" hidden></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
