<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <title>JARVIS - 음성 AI 어시스턴트</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="auth-screen">
    <div class="auth-container">
      <h1 class="auth-title">J.A.R.V.I.S</h1>
      <p class="auth-subtitle">음성 AI 어시스턴트</p>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="이메일" required>
        <input type="password" id="auth-password" placeholder="비밀번호" required>
        <button type="submit" id="auth-submit">로그인</button>
      </form>
      <p class="auth-toggle">계정이 없으신가요? <a href="#" id="toggle-auth">회원가입</a></p>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- 배경 그리드 -->
    <div id="bg-grid"></div>

    <!-- 상태 표시 영역 -->
    <header id="status-bar">
      <span id="status-text">대기 중</span>
      <span id="time-display"></span>
    </header>

    <!-- 메인 비주얼 (음성 파형/아이콘 영역) -->
    <main id="main-area">
      <div id="orb-container">
        <div id="orb" class="idle">
          <div class="orb-core"></div>
        </div>
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
        <div class="ripple ripple-3"></div>
        <div class="ripple ripple-4"></div>
      </div>
      <p id="guide-message">자비스라고 불러주세요</p>
      <p id="transcript"></p>
      <p id="response-text"></p>
    </main>

    <!-- 하단 컨트롤 -->
    <footer id="controls">
      <button id="mic-btn" aria-label="마이크 토글">🎤</button>
    </footer>

    <!-- YouTube 플레이어 (숨김) -->
    <div id="youtube-player" hidden></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
